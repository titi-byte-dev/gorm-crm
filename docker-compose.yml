services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       gorm_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Módulo 09 — MongoDB para activity logs
  # mongo:
  #   image: mongo:7
  #   ports: ["27017:27017"]

  # Módulo 17 — Redis para cache
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]

volumes:
  postgres_data:
